services:
    postgres_leila:
        image: postgres:${POSTGRESQL_VERSION}
        container_name: postgres_leila
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${DB_NAME}
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql

    backend_leila:
        build:
            context: ./backend
            args:
                NODE_VERSION: ${NODE_VERSION}
        image: node:${NODE_VERSION}
        container_name: backend_leila
        working_dir: /app
        volumes:
            - ./backend:/app
            - /app/node_modules
        ports:
            - "3000:3000"
        command: sh -c "npm install && npm run db:migrate && npm run dev"
        environment:
            DB_HOST: ${DB_HOST}
            DB_PORT: ${DB_PORT}
            DB_NAME: ${DB_NAME}
            DB_USER: ${DB_USER}
            DB_PASSWORD: ${DB_PASSWORD}
            APP_PORT: 3000
        depends_on:
            - postgres_leila

    frontend_leila:
        build:
            context: ./frontend
            args:
                NODE_VERSION: ${NODE_VERSION}
        image: node:${NODE_VERSION}
        container_name: frontend_leila
        working_dir: /app
        environment:
            CHOKIDAR_USEPOLLING: "true"
            WATCHPACK_POLLING: "true"
        volumes:
            - ./frontend:/app
            - /app/node_modules
        ports:
            - "9000:9000"
        command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
        depends_on:
            - backend_leila

volumes:
    postgres_data:
